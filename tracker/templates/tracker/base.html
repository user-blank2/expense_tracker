<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Expense Tracker{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark:    '#0f1f0f',
                        card:    '#1a2e1a',
                        border:  '#2d4a2d',
                        accent:  '#4ade80',
                        muted:   '#86a886',
                    }
                }
            }
        }
    </script>
    <style>
        input, textarea, select {
            width: 100%;
            background-color: #1a2e1a;
            border: 1px solid #2d4a2d;
            color: white;
            padding: 0.625rem 0.875rem;
            border-radius: 0.5rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus, select:focus {
            border-color: #4ade80;
        }
        option { background-color: #1a2e1a; }
    </style>
</head>
<body class="bg-dark min-h-screen text-white">

    <!-- Navbar -->
    <nav class="bg-card border-b border-border px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">💸</span>
                <span class="text-xl font-bold text-accent">ExpenseTracker</span>
            </div>
            <div class="flex items-center gap-3">
                <a href="{% url 'add_category' %}"
                class="border border-accent text-accent px-4 py-2 rounded-lg text-sm font-bold hover:bg-accent hover:text-dark transition">
                    + Category
                </a>
                <a href="{% url 'add_expense' %}"
                class="bg-accent text-dark px-4 py-2 rounded-lg text-sm font-bold hover:opacity-90 transition">
                    + Add Expense
                </a>
            </div>
        </div>
        
    </nav>

    <!-- Content -->
    <main class="max-w-6xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
